name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify-shared:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: CLI smoke
        run: npm run smoke:cli

      - name: Bootstrap smoke
        run: npm run smoke:bootstrap

      - name: CLI acceptance suite
        run: npm run acceptance:cli

  verify-hosted:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lane verify (hosted)
        run: npm run verify:hosted

      - name: Upload hosted lane coverage report
        uses: actions/upload-artifact@v4
        with:
          name: lane-coverage-hosted
          path: docs/reports/lane-coverage-report.json

  verify-operator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lane verify (operator)
        run: npm run verify:operator

      - name: Upload operator lane coverage report
        uses: actions/upload-artifact@v4
        with:
          name: lane-coverage-operator
          path: docs/reports/lane-coverage-report.json
